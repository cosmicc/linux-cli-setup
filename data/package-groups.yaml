# Package group mapping for linux-cli-setup.
#
# Each item defines one profile/tier row. Package names are listed one per line
# under the distro family where they are valid. Use an empty list when a row has
# no packages for that distro family.
package_groups:
  - group: core
    tier: required
    arch:
      - base-devel
      - ca-certificates
      - curl
      - wget
      - gnupg
      - git
      - openssh
      - fish
      - htop
      - btop
      - vim
      - nfs-utils
      - ufw
      - chrony
      - fail2ban
      - logrotate
      - unzip
      - zip
      - 7zip
      - tar
      - gzip
      - xz
      - tmux
      - fontconfig
    debian_ubuntu:
      - ca-certificates
      - curl
      - wget
      - gnupg
      - git
      - openssh-server
      - fish
      - htop
      - btop
      - vim
      - nfs-common
      - ufw
      - chrony
      - fail2ban
      - logrotate
      - unzip
      - zip
      - p7zip-full
      - tar
      - gzip
      - xz-utils
      - tmux
      - fontconfig
    notes: "Core CLI baseline, shell requirements, NTP, SSH protection, and log rotation."

