    notes: "Docker host packages; Debian/Ubuntu defaults to Docker's official repository."

  - group: docker
    tier: required_distro
    arch: []
    debian_ubuntu:
      - docker.io
    notes: "Debian/Ubuntu Docker fallback when LINUX_CLI_DOCKER_APT_SOURCE=distro or the official repository is unavailable."

  - group: docker
    tier: recommended
    arch:
      - lazydocker
      - dive
      - ctop
      - hadolint
    debian_ubuntu: []
    notes: "Docker CLI helper tools packaged for Arch."

  - group: docker
    tier: recommended_distro
    arch: []
    debian_ubuntu:
      - docker-compose
    notes: "Debian/Ubuntu Docker distro fallback helper package."

