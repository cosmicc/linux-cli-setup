# linux-cli-setup automatic update configuration.
# shellcheck shell=bash disable=SC2034
# Keep this file owned by root with mode 0600 because it may contain Pushover keys.

# Mode: "notify" sends a Pushover alert when a reboot is required.
# Mode: "reboot" sends a Pushover alert and reboots automatically when required.
MODE="reboot"

# Set these locally after install. Do not commit real Pushover credentials.
PUSHOVER_USER_KEY=""
PUSHOVER_API_TOKEN=""
PUSHOVER_TITLE="Linux Update"
