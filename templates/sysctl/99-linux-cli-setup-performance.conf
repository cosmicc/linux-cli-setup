# Managed by linux-cli-setup.
# Common, conservative performance defaults for CLI systems.

# Give development tools and file watchers room without changing application
# service limits directly.
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024
fs.file-max = 2097152

# Prefer keeping file cache useful while avoiding excessive swap pressure.
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_background_ratio = 5
vm.dirty_ratio = 20

# Improve backlog capacity for local services and tolerate black-hole MTU paths.
net.core.somaxconn = 4096
net.ipv4.tcp_mtu_probing = 1
