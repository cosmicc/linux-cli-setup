# shellcheck shell=bash disable=SC2034
# Managed UniFetch configuration for linux-cli-setup login MOTD output.
# The MOTD wrapper calls UniFetch with this file when the unifetch command is
# available, then falls back to the built-in linux-cli-setup status block if not.

print_info() {
    info title
    info underline

    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Packages" packages
    info "Shell" shell
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info "Disk" disk
    info "Local IP" local_ip
    info "Public IP" public_ip
    info "Users" users
    info "Locale" locale
}

title_fqdn="off"
os_arch="on"
distro_shorthand="off"
kernel_shorthand="off"
uptime_shorthand="on"

package_managers="on"
show_package_total="on"

shell_path="off"
shell_version="on"

cpu_brand="on"
cpu_cores="logical"
cpu_speed="on"
cpu_temp="off"

gpu_brand="on"
gpu_type="all"

memory_percent="on"
memory_unit="gib"
memory_display="barinfo"

disk_show=('/')
disk_subtitle="mount"
disk_percent="on"
disk_display="barinfo"

local_ip_interface=('auto')
public_ip_host="https://api.ipify.org"
public_ip_timeout=2

image_backend="ascii"
image_source="auto"
ascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
color_blocks="off"
