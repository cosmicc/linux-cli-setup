# shellcheck shell=bash disable=SC2034,SC2317
# Managed UniFetch configuration for linux-cli-setup login MOTD output.
# The MOTD wrapper calls UniFetch with this file when the unifetch command is
# available, then falls back to the built-in linux-cli-setup status block if not.

print_info() {
    info title
    info underline

    prin "System"
    info "OS" distro
    info "Host" model
    info "Kernel" kernel
    info "Uptime" uptime
    info "Load Average" load_average
    info "Packages" packages
    info "Shell" shell
    info "Locale" locale
    info "Temperature" temperature
    info "Processes" process_count
    info "Users Logged In" logged_in_user_count

    prin "----------------------------------------"
    prin "Resources"
    info "CPU" cpu
    info "GPU" gpu
    info "Memory" memory
    info "Swap" swap_summary
    info "Disk" disk

    prin "----------------------------------------"
    prin "Network"
    info "Local IP" local_ip
    info "DNS Servers" dns_servers
    info "Internet" internet_status

    prin "----------------------------------------"
    prin "Services"
    info "Updates" package_updates
    info "Firewall" firewall_status
    info "SSH" ssh_status
    info "Reboot Required" reboot_required
}

get_disk() {
    local -a storage_paths=()
    local disk_output mountpoint percent remaining total used

    mapfile -t storage_paths <<< "${LINUX_CLI_MOTD_STORAGE_PATHS:-/}"
    disk_output="$(
        timeout 1 df -h --output=size,used,avail,pcent,target "${storage_paths[@]}" 2>/dev/null || true
    )"

    while read -r total used remaining percent mountpoint; do
        [[ "$total" == "Size" || -z "$mountpoint" ]] && continue
        prin "${subtitle:-Disk} ($mountpoint)" \
            "$used used of $total ($percent), $remaining free"
    done <<< "$disk_output"
}

get_internet_status() {
    get_public_ip
    public_ip="${public_ip//$'\r'/}"
    public_ip="${public_ip//$'\n'/}"

    if [[ "$public_ip" =~ ^[0-9A-Fa-f:.]+$ ]]; then
        internet_status="online ($public_ip)"
    else
        internet_status="unavailable"
    fi
}

get_load_average() {
    load_average="$(cut -d' ' -f1-3 /proc/loadavg 2>/dev/null)"
}

get_temperature() {
    local temperature_file temperature_value
    local highest_millicelsius=0

    for temperature_file in /sys/class/thermal/thermal_zone*/temp /sys/class/hwmon/hwmon*/temp*_input; do
        [[ -r "$temperature_file" ]] || continue
        temperature_value="$(head -n 1 "$temperature_file" 2>/dev/null || true)"
        [[ "$temperature_value" =~ ^[0-9]+$ ]] || continue
        temperature_value=$((10#$temperature_value))
        if ((temperature_value >= 1000 && temperature_value <= 200000 && temperature_value > highest_millicelsius)); then
            highest_millicelsius="$temperature_value"
        elif ((temperature_value > 0 && temperature_value < 1000 && temperature_value * 1000 > highest_millicelsius)); then
            highest_millicelsius=$((temperature_value * 1000))
        fi
    done

    if ((highest_millicelsius > 0)); then
        temperature="$(awk -v value="$highest_millicelsius" 'BEGIN { printf "%.1f C", value / 1000 }')"
        return
    fi

    temperature=""
    if command -v sensors >/dev/null 2>&1; then
        temperature="$(
            timeout 2 sensors 2>/dev/null |
                awk '
                    /Package id 0:|Tctl:|CPU Temperature:/ {
                        if (match($0, /[+][0-9]+([.][0-9]+)?/)) {
                            print substr($0, RSTART + 1, RLENGTH - 1) " C"
                            exit
                        }
                    }
                ' || true
        )"
    fi
}

get_process_count() {
    local -a process_directories=(/proc/[0-9]*)

    process_count="${#process_directories[@]}"
}

get_logged_in_user_count() {
    logged_in_user_count="$(who 2>/dev/null | awk '{ print $1 }' | LC_ALL=C sort -u | grep -c . || true)"
    logged_in_user_count="${logged_in_user_count:-0}"
}

get_swap_summary() {
    local free total used used_percent

    total="$(awk '/^SwapTotal:/ { print $2 }' /proc/meminfo)"
    free="$(awk '/^SwapFree:/ { print $2 }' /proc/meminfo)"
    total="${total:-0}"
    free="${free:-0}"
    used=$((total - free))
    used_percent="$(awk -v used="$used" -v total="$total" 'BEGIN { printf "%.0f", (total > 0 ? used * 100 / total : 0) }')"
    swap_summary="$(awk -v used="$used" -v total="$total" -v percent="$used_percent" 'BEGIN { printf "%.1fGi / %.1fGi (%s%%)", used / 1024 / 1024, total / 1024 / 1024, percent }')"
}

get_dns_servers() {
    dns_servers="$({
        awk '$1 == "nameserver" { print $2 }' /etc/resolv.conf 2>/dev/null || true
        if command -v resolvectl >/dev/null 2>&1; then
            timeout 2 resolvectl dns 2>/dev/null |
                awk -F': ' 'NF == 2 { count = split($2, values, " "); for (i = 1; i <= count; i++) print values[i] }' || true
        fi
    } | awk '
        /^[0-9A-Fa-f:.]+$/ && !seen[$0]++ {
            output = output ? output ", " $0 : $0
        }
        END { print output }
    ')"
    dns_servers="${dns_servers:-unavailable}"
}

get_package_updates() {
    local count output status=0

    if command -v pacman >/dev/null 2>&1; then
        output="$(timeout 2 pacman -Qu 2>/dev/null)" || status=$?
        [[ "$status" -eq 1 && -z "$output" ]] && status=0
    elif command -v apt-get >/dev/null 2>&1; then
        output="$(
            timeout 2 apt-get --simulate -o Debug::NoLocking=1 upgrade 2>/dev/null
        )" || status=$?
        if [[ "$status" -eq 0 ]]; then
            output="$(grep '^Inst ' <<< "$output" || true)"
        fi
    else
        package_updates="unavailable"
        return
    fi

    if [[ "$status" -eq 124 ]]; then
        package_updates="check timed out"
        return
    elif [[ "$status" -ne 0 ]]; then
        package_updates="check unavailable"
        return
    fi

    count="$(grep -cve '^[[:space:]]*$' <<< "$output" || true)"
    if [[ "$count" -eq 0 ]]; then
        package_updates="none known (cached metadata)"
    else
        package_updates="$count available (cached metadata)"
    fi
}

get_firewall_status() {
    local enabled status

    if [[ -r /etc/ufw/ufw.conf ]]; then
        enabled="$(awk -F= '/^ENABLED=/ { print tolower($2); exit }' /etc/ufw/ufw.conf)"
        [[ "$enabled" == "yes" ]] && firewall_status="enabled" || firewall_status="disabled"
        return
    fi

    if [[ "$EUID" -eq 0 ]] && command -v ufw >/dev/null 2>&1; then
        status="$(timeout 1 ufw status 2>/dev/null | awk 'NR == 1 { print tolower($2) }')"
        firewall_status="${status:-unavailable}"
        return
    fi

    firewall_status="unavailable"
}

get_ssh_status() {
    ssh_status="unknown"
    if command -v systemctl >/dev/null 2>&1; then
        ssh_status="$(timeout 1 systemctl is-active ssh.service 2>/dev/null || true)"
        if [[ -z "$ssh_status" || "$ssh_status" == "inactive" || "$ssh_status" == "failed" ]]; then
            ssh_status="$(timeout 1 systemctl is-active sshd.service 2>/dev/null || true)"
        fi
    fi
    ssh_status="${ssh_status:-unknown}"
}

get_reboot_required() {
    local latest_kernel

    if [[ -f /var/run/reboot-required ]]; then
        reboot_required="yes"
        return
    fi

    latest_kernel="$(
        find /usr/lib/modules -mindepth 1 -maxdepth 1 -printf '%f\n' 2>/dev/null |
            sort -V |
            tail -n 1 || true
    )"
    if [[ -n "$latest_kernel" && "$(uname -r)" != "$latest_kernel" ]]; then
        reboot_required="maybe"
    else
        reboot_required="no"
    fi
}

title_fqdn="off"
os_arch="on"
distro_shorthand="off"
kernel_shorthand="off"
uptime_shorthand="on"

package_managers="on"
show_package_total="on"

shell_path="off"
shell_version="on"

cpu_brand="on"
cpu_cores="logical"
cpu_speed="on"
cpu_temp="off"

gpu_brand="on"
gpu_type="all"

memory_percent="on"
memory_unit="gib"
memory_display="barinfo"

disk_subtitle="mount"
disk_percent="on"
disk_display="barinfo"

local_ip_interface=('auto')
public_ip_host="https://api.ipify.org"
public_ip_timeout=2

image_backend="ascii"
image_source="auto"
ascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
color_blocks="off"
