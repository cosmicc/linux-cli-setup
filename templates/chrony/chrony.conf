# Managed by linux-cli-setup.
#
# DHCP-provided NTP servers are written into /run/chrony-dhcp by the managed
# NetworkManager and dhclient hooks. The public pool remains the fallback.

sourcedir /run/chrony-dhcp
sourcedir /etc/chrony/sources.d

pool us.pool.ntp.org iburst

driftfile /var/lib/chrony/drift
makestep 1.0 3
rtcsync

logdir /var/log/chrony
